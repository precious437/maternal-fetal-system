<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9caf88 0%, #8da878 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 32px rgba(31, 38, 135, 0.37),
                0 20px 60px rgba(31, 38, 135, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.25);
            animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #1e3a5f;
            margin-bottom: 15px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #1e3a5f, #2a4a7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #1e3a5f, #2a4a7f);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-weight: 600;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 15px rgba(30, 58, 95, 0.4),
                0 8px 25px rgba(42, 74, 127, 0.2);
        }
        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s;
        }
        a:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 8px 25px rgba(30, 58, 95, 0.5),
                0 15px 35px rgba(42, 74, 127, 0.3),
                0 20px 40px rgba(30, 58, 95, 0.15);
        }
        a:hover::before {
            left: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Medical AI Platform</h1>
        <p>Advanced Surgical & Educational Tools</p>
        <nav>
            <a href="/education.html">📚 Education Hub</a>
            <a href="/surgical.html">🏥 Surgical AI</a>
            <a href="/mri-device">🔬 MRI Device</a>
            <a href="/login">🔐 Login/Register</a>
            <a href="/settings">⚙️ Settings</a>
            <a href="/help">❓ Help</a>
        </nav>
    </div>
</body>
</html>
