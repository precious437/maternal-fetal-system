<!DOCTYPE html>
<html>
<head><title>Login</title></head>

<body style="margin:0; font-family:Arial; background:#9caf88;">

<div style="max-width:400px; margin:auto; margin-top:100px; background:white; padding:30px; border-radius:10px;">

<h2 style="text-align:center; color:#1e3a5f;">Login</h2>

<select id="role" style="width:100%; padding:10px;">
<option value="Student">Student</option>
<option value="Surgeon">Surgeon</option>
</select><br><br>

<input id="email" placeholder="Email" style="width:100%; padding:10px;"><br><br>

<div style="position:relative;">
<input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px;">
<span onclick="toggle()" style="position:absolute; right:10px; top:10px; cursor:pointer;">👁</span>
</div><br>

<button onclick="handleLogin()" style="width:100%; padding:10px; background:#1e3a5f; color:white; cursor:pointer;">Login</button>
<button onclick="toggleRegister()" style="width:100%; padding:10px; background:#555; color:white; margin-top:10px; cursor:pointer;">Register</button>

<div id="message" style="margin-top:10px; text-align:center; color:red;"></div>

</div>

<script>
function toggle(){
let p=document.getElementById("pass");
p.type=p.type==="password"?"text":"password";
}

async function handleLogin(){
const email = document.getElementById('email').value;
const password = document.getElementById('pass').value;
const role = document.getElementById('role').value;
const msg = document.getElementById('message');

if(!email || !password){
msg.textContent = 'Please fill all fields';
return;
}

try {
const response = await fetch('/api/login', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({email, password, role})
});

const data = await response.json();

if(data.success){
msg.style.color = 'green';
msg.textContent = 'Login successful!';
setTimeout(() => window.location.href = '/', 1500);
} else {
msg.textContent = data.message || 'Login failed';
}
} catch(e){
msg.textContent = 'Error: ' + e.message;
}
}

function toggleRegister(){
alert('Registration coming soon!');
}
</script>

</body>
</html>
